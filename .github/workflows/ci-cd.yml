name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r app_backend/requirements.txt

      - name: Black (format)
        run: |
          black app_backend tests/backend_tests.py

      - name: Black (check)
        run: |
          black --check app_backend tests/backend_tests.py

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q tests/backend_tests.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_frontend
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm install

      - name: Ensure jest-environment-jsdom is installed
        run: |
          npm install --no-save jest-environment-jsdom@^29

      - name: ESLint
        run: npm run lint

      - name: Jest
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push backend image (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-powered-dashboard-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-powered-dashboard-backend:sha-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-powered-dashboard-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-powered-dashboard-frontend:sha-${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

